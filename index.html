<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grade Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: #f1f5f9;
    color: #1e293b;
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: linear-gradient(135deg, #1e3a5f 0%, #2f5496 100%);
    color: white;
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }
  .header-left { flex: 1; min-width: 0; }
  .header h1 { font-size: 1.45rem; font-weight: 700; letter-spacing: -0.02em; }
  .header p  { margin-top: 5px; opacity: 0.72; font-size: 0.83rem; }

  /* ── Student Switcher ── */
  .student-switcher { position: relative; flex-shrink: 0; }
  .switcher-btn {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.13); border: 1.5px solid rgba(255,255,255,0.22);
    border-radius: 10px; padding: 7px 12px 7px 8px;
    cursor: pointer; color: white; user-select: none;
    transition: background .15s;
  }
  .switcher-btn:hover { background: rgba(255,255,255,0.22); }
  .s-avatar {
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 0.78rem; font-weight: 700; color: white; flex-shrink: 0; overflow: hidden;
  }
  .s-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .switcher-name  { font-size: 0.88rem; font-weight: 600; white-space: nowrap; }
  .switcher-caret { font-size: 0.6rem; opacity: 0.75; transition: transform .2s; margin-left: 2px; }
  .student-switcher.open .switcher-caret { transform: rotate(180deg); }

  .switcher-dropdown {
    display: none; position: absolute; top: calc(100% + 8px); right: 0;
    background: white; border-radius: 12px; min-width: 220px;
    box-shadow: 0 8px 30px rgba(0,0,0,.18); overflow: hidden; z-index: 100;
  }
  .student-switcher.open .switcher-dropdown { display: block; }
  .switcher-item {
    display: flex; align-items: center; gap: 11px; padding: 11px 16px;
    cursor: pointer; transition: background .1s; color: #1e293b;
  }
  .switcher-item:hover  { background: #f1f5f9; }
  .switcher-item.active { background: #eff6ff; }
  .si-avatar {
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700; flex-shrink: 0; overflow: hidden; color: white;
  }
  .si-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  .si-name   { font-size: 0.88rem; font-weight: 600; color: #1e293b; }
  .si-school { font-size: 0.71rem; color: #64748b; margin-top: 1px; }

  /* ── Layout ── */
  .main { max-width: 980px; margin: 0 auto; padding: 24px 16px 56px; }

  /* ── Summary cards ── */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(138px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }
  .summary-card {
    background: white; border-radius: 14px; padding: 18px 12px 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,.07);
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    cursor: pointer; transition: box-shadow .15s, transform .15s; text-decoration: none;
  }
  .summary-card:hover { box-shadow: 0 6px 16px rgba(0,0,0,.11); transform: translateY(-2px); }
  .grade-letter { font-size: 2.4rem; font-weight: 800; line-height: 1; }
  .grade-pct    { font-size: 0.95rem; font-weight: 600; }
  .grade-name   { font-size: 0.68rem; text-align: center; color: #64748b; margin-top: 3px; line-height: 1.3; }
  .trend-arrow  { font-size: 0.8rem; margin-top: 2px; }

  /* ── Chart card ── */
  .chart-card {
    background: white; border-radius: 14px; padding: 20px 20px 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,.07); margin-bottom: 24px;
  }
  .section-label {
    font-size: 0.75rem; font-weight: 700; color: #94a3b8;
    text-transform: uppercase; letter-spacing: .07em; margin-bottom: 16px;
  }
  .chart-placeholder { text-align: center; color: #94a3b8; padding: 32px 0; font-size: .85rem; }
  .chart-subtitle {
    font-size: 0.72rem; color: #94a3b8; margin-bottom: 12px; min-height: 1em;
  }

  /* ── Detail cards ── */
  .detail-card {
    background: white; border-radius: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,.07); margin-bottom: 12px; overflow: hidden;
  }
  .detail-header {
    padding: 15px 18px; display: flex; align-items: center;
    justify-content: space-between; cursor: pointer; user-select: none;
    transition: background .1s;
  }
  .detail-header:hover { background: #f8fafc; }
  .detail-title   { font-weight: 700; font-size: 0.93rem; letter-spacing: -.01em; }
  .detail-teacher { font-size: 0.76rem; color: #94a3b8; margin-top: 2px; }
  .detail-right   { display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .detail-pct     { font-size: 0.88rem; font-weight: 600; }
  .detail-letter  { font-size: 1.5rem; font-weight: 800; width: 34px; text-align: center; }
  .chevron        { color: #cbd5e1; font-size: 0.85rem; transition: transform .2s; margin-left: 4px; }
  .detail-card.open .chevron { transform: rotate(180deg); }
  .detail-body { padding: 2px 18px 18px; border-top: 1px solid #f1f5f9; }

  /* ── Category rows ── */
  .cat-row { margin-top: 16px; }
  .cat-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 7px; }
  .cat-left  { display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap; }
  .cat-name  { font-size: 0.82rem; font-weight: 600; color: #334155; }
  .cat-wt    { font-size: 0.72rem; color: #94a3b8; }
  .cat-right { display: flex; gap: 10px; align-items: baseline; flex-shrink: 0; }
  .cat-pts   { font-size: 0.78rem; color: #94a3b8; }
  .cat-pct   { font-size: 0.85rem; font-weight: 700; min-width: 44px; text-align: right; }
  .not-yet   { font-size: 0.78rem; color: #cbd5e1; font-style: italic; }
  .bar-bg    { background: #f1f5f9; border-radius: 99px; height: 7px; overflow: hidden; }
  .bar-fill  { height: 100%; border-radius: 99px; transition: width .5s ease; }

  /* ── Assignment rows ── */
  .asgn-list { margin-top: 10px; padding-top: 4px; border-top: 1px solid #f1f5f9; }
  .asgn-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 0 5px 14px; border-bottom: 1px solid #f8fafc; font-size: 0.78rem; gap: 8px;
  }
  .asgn-row:last-child { border-bottom: none; }
  .asgn-left  { display: flex; align-items: center; gap: 6px; flex: 1; min-width: 0; }
  .asgn-name  { font-weight: 500; color: #334155; white-space: nowrap; }
  .asgn-right { display: grid; grid-template-columns: 18px 100px 56px 46px; column-gap: 8px; align-items: center; flex-shrink: 0; }
  .asgn-note-icon { position: relative; display: flex; align-items: center; justify-content: center; }
  .asgn-note-icon svg { width: 13px; height: 13px; color: #94a3b8; flex-shrink: 0; }
  .asgn-note-icon[data-note]:hover svg { color: #475569; }
  .asgn-note-icon[data-note]::after {
    content: attr(data-note);
    position: absolute; bottom: calc(100% + 7px); left: 50%; transform: translateX(-50%);
    background: #1e293b; color: #f1f5f9; font-size: 0.72rem; font-weight: 400;
    padding: 5px 10px; border-radius: 6px; white-space: nowrap;
    box-shadow: 0 3px 10px rgba(0,0,0,.25); pointer-events: none;
    opacity: 0; transition: opacity .15s; z-index: 20;
  }
  .asgn-note-icon[data-note]::before {
    content: ''; position: absolute; bottom: calc(100% + 3px); left: 50%; transform: translateX(-50%);
    border: 4px solid transparent; border-top-color: #1e293b;
    pointer-events: none; opacity: 0; transition: opacity .15s; z-index: 20;
  }
  .asgn-note-icon[data-note]:hover::after,
  .asgn-note-icon[data-note]:hover::before { opacity: 1; }
  .asgn-due { color: #94a3b8; font-size: 0.71rem; white-space: nowrap; }
  .asgn-pts { color: #94a3b8; font-size: 0.71rem; text-align: right; }
  .asgn-pct { font-weight: 600; font-size: 0.78rem; text-align: right; }

  /* ── Active card state ── */
  .summary-card.chart-active {
    box-shadow: 0 0 0 2.5px #1e3a5f, 0 6px 16px rgba(0,0,0,.12);
    transform: translateY(-2px);
  }
</style>
</head>

// ── Avatar colors for initials fallback ───────────────────────────────────────
const AVATAR_BG = ['#6366f1','#ec4899','#10b981','#f59e0b','#3b82f6','#8b5cf6'];

// ── State ─────────────────────────────────────────────────────────────────────
let currentIdx = 0;
let trendChart = null;
let activeCard = null;

// ── Helpers ───────────────────────────────────────────────────────────────────
function gradeColor(pct) {
  if (pct == null) return { bg:'#f8fafc', text:'#94a3b8', bar:'#e2e8f0' };
  if (pct >= 0.90) return { bg:'#f0fdf4', text:'#15803d', bar:'#22c55e' };
  if (pct >= 0.80) return { bg:'#eff6ff', text:'#1d4ed8', bar:'#3b82f6' };
  if (pct >= 0.70) return { bg:'#fffbeb', text:'#92400e', bar:'#f59e0b' };
  if (pct >= 0.60) return { bg:'#fff7ed', text:'#9a3412', bar:'#f97316' };
  return { bg:'#fef2f2', text:'#991b1b', bar:'#ef4444' };
}
function pctStr(pct) {
  return pct == null ? '—' : (pct * 100).toFixed(1) + '%';
}
function initials(name) {
  return name.split(' ').filter(p => /^[A-Z]/.test(p)).map(p => p[0]).join('').slice(0, 2);
}
function makeAvatar(student, size, cls) {
  const el = document.createElement('div');
  el.className = cls;
  el.style.cssText = `width:${size}px;height:${size}px`;
  if (student.photo) {
    el.innerHTML = `<img src="${student.photo}" alt="${student.name}">`;
  } else {
    el.style.background = AVATAR_BG[DATA.students.indexOf(student) % AVATAR_BG.length];
    el.textContent = initials(student.name);
  }
  return el;
}
function trendArrow(dates, courseName, student) {
  const vals = dates
    .map(d => student.snapshots[d]?.courses.find(c => c.name === courseName)?.weightedPct ?? null)
    .filter(v => v != null);
  if (vals.length < 2) return '';
  const delta = vals[vals.length-1] - vals[vals.length-2];
  if (delta >  0.005) return `<span style="color:#22c55e;font-size:.9rem">↑</span>`;
  if (delta < -0.005) return `<span style="color:#ef4444;font-size:.9rem">↓</span>`;
  return `<span style="color:#94a3b8;font-size:.9rem">→</span>`;
}

const CAT_COLORS = {
  'Assessment (Summative)': '#6366f1',
  'Assignment (Formative)': '#10b981',
  'Final Exam':             '#f59e0b',
};
function catColor(name) { return CAT_COLORS[name] || '#94a3b8'; }

// ── Student Switcher ──────────────────────────────────────────────────────────
function buildSwitcher() {
  const student  = DATA.students[currentIdx];
  const switcher = document.getElementById('student-switcher');
  // Preserve open state during rebuilds triggered by renderDashboard
  const wasOpen  = switcher.classList.contains('open');
  switcher.innerHTML = '';

  // Trigger button
  const btn = document.createElement('div');
  btn.className = 'switcher-btn';
  btn.appendChild(makeAvatar(student, 34, 's-avatar'));
  const nameSpan = document.createElement('span');
  nameSpan.className = 'switcher-name';
  nameSpan.textContent = student.name.split(' ')[0] + ' ' + student.name.split(' ').pop();
  const caret = document.createElement('span');
  caret.className = 'switcher-caret';
  caret.textContent = '▼';
  btn.appendChild(nameSpan);
  btn.appendChild(caret);
  btn.addEventListener('click', e => { e.stopPropagation(); switcher.classList.toggle('open'); });

  // Dropdown
  const drop = document.createElement('div');
  drop.className = 'switcher-dropdown';
  DATA.students.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'switcher-item' + (i === currentIdx ? ' active' : '');
    item.appendChild(makeAvatar(s, 32, 'si-avatar'));
    const info = document.createElement('div');
    info.innerHTML = `<div class="si-name">${s.name}</div><div class="si-school">${s.school}</div>`;
    item.appendChild(info);
    item.addEventListener('click', () => switchStudent(i));
    drop.appendChild(item);
  });

  switcher.appendChild(btn);
  switcher.appendChild(drop);
  if (wasOpen) switcher.classList.add('open');
}

document.addEventListener('click', () => {
  document.getElementById('student-switcher')?.classList.remove('open');
});

function switchStudent(idx) {
  currentIdx = idx;
  activeCard = null;
  document.getElementById('student-switcher').classList.remove('open');
  renderDashboard();
}

// ── Chart helpers ─────────────────────────────────────────────────────────────
function overviewDatasets(courses, dates, student, SHORT, COLORS) {
  return courses.map((course, i) => ({
    label:           SHORT[course.name] || course.name,
    data:            dates.map(d => {
      const c = student.snapshots[d]?.courses.find(c => c.name === course.name);
      return c?.weightedPct != null ? +(c.weightedPct * 100).toFixed(2) : null;
    }),
    borderColor:     COLORS[i % COLORS.length],
    backgroundColor: COLORS[i % COLORS.length] + '18',
    fill: false,
    tension: 0.35, spanGaps: true, pointRadius: 5, pointHoverRadius: 7, borderWidth: 2.5,
  }));
}

function classDatasets(courseName, dates, student) {
  const catNames = [];
  dates.forEach(d => {
    const c = student.snapshots[d]?.courses.find(c => c.name === courseName);
    (c?.categories || []).forEach(cat => {
      if (!catNames.includes(cat.name)) catNames.push(cat.name);
    });
  });
  return catNames.map(catName => {
    const contributions = [], rawPcts = [];
    dates.forEach(d => {
      const c   = student.snapshots[d]?.courses.find(c => c.name === courseName);
      const cat = c?.categories.find(ct => ct.name === catName);
      if (!cat || cat.possible === 0) { contributions.push(null); rawPcts.push(null); return; }
      const totalWt = (c.categories || []).reduce((s, ct) => s + (ct.possible > 0 ? ct.weight : 0), 0);
      contributions.push(totalWt > 0 ? +(cat.earned / cat.possible * cat.weight / totalWt * 100).toFixed(2) : null);
      rawPcts.push(+(cat.earned / cat.possible * 100).toFixed(2));
    });
    return {
      label: catName, data: contributions, rawPcts,
      borderColor: catColor(catName), backgroundColor: catColor(catName) + '55',
      fill: true, tension: 0.35, spanGaps: true, pointRadius: 5, pointHoverRadius: 7, borderWidth: 2.5,
    };
  });
}

function switchChartView(datasets, sub, stacked, yMin) {
  if (!trendChart) return;
  trendChart.data.datasets = datasets;
  trendChart.options.scales.y.stacked = stacked || false;
  trendChart.options.scales.y.min     = yMin !== undefined ? yMin : 50;
  trendChart.options.scales.y.max     = stacked ? 110 : 105;
  if (stacked) {
    trendChart.options.scales.y.ticks.autoSkip = false;
    trendChart.options.plugins.tooltip.callbacks.label = ctx => {
      const raw    = ctx.dataset.rawPcts?.[ctx.dataIndex];
      const contrib = ctx.parsed.y?.toFixed(1);
      const l = raw != null ? (raw>=90?'A':raw>=80?'B':raw>=70?'C':raw>=60?'D':'F') : '';
      return raw != null
        ? ` ${ctx.dataset.label}: ${l} ${raw.toFixed(1)}% raw (${contrib}% contrib)`
        : ` ${ctx.dataset.label}: ${contrib}%`;
    };
    trendChart.options.plugins.tooltip.callbacks.footer = items => {
      const total = items.reduce((s, i) => s + (i.parsed.y || 0), 0);
      return `Overall: ${total.toFixed(1)}%`;
    };
  } else {
    trendChart.options.scales.y.ticks.autoSkip = true;
    trendChart.options.plugins.tooltip.callbacks.label  = ctx => { const p = ctx.parsed.y; const l = p>=90?'A':p>=80?'B':p>=70?'C':p>=60?'D':'F'; return ` ${ctx.dataset.label}: ${l} ${p?.toFixed(1)}%`; };
    trendChart.options.plugins.tooltip.callbacks.footer = undefined;
  }
  trendChart.update();
  document.getElementById('chart-subtitle').textContent = sub;
}

// ── Main render ───────────────────────────────────────────────────────────────
function renderDashboard() {
  const student = DATA.students[currentIdx];
  const SHORT   = student.shortNames || {};
  const COLORS  = student.colors || ['#6366f1','#10b981','#f59e0b','#3b82f6','#ef4444','#8b5cf6'];
  const dates   = Object.keys(student.snapshots).sort();
  const latest  = dates[dates.length - 1];
  const courses = latest ? (student.snapshots[latest].courses || []) : [];

  // Header
  document.getElementById('hdr-name').textContent = student.name + ' — Grade Tracker';
  const d = latest ? new Date(latest + 'T12:00:00') : new Date();
  document.getElementById('hdr-sub').textContent =
    student.school + '  ·  ' + student.term + '  ·  Updated ' +
    d.toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
  document.title = student.name.split(' ')[0] + ' · Grade Tracker';

  buildSwitcher();

  // ── Summary grid ────────────────────────────────────────────────────────────
  const grid = document.getElementById('summary-grid');
  grid.innerHTML = '';
  if (courses.length === 0) {
    grid.innerHTML = '<p style="color:#94a3b8;grid-column:1/-1;text-align:center;padding:40px 0;font-size:.9rem">No data yet — will populate after next scheduled fetch.</p>';
  } else {
    courses.forEach((course, i) => {
      const c     = gradeColor(course.weightedPct);
      const arrow = trendArrow(dates, course.name, student);
      const card  = document.createElement('div');
      card.className = 'summary-card';
      card.style.background = c.bg;
      card.innerHTML = `
        <div class="grade-letter" style="color:${c.text}">${course.letterGrade}</div>
        <div class="grade-pct"    style="color:${c.text}">${pctStr(course.weightedPct)}</div>
        <div class="grade-name">${SHORT[course.name] || course.name}</div>
        ${arrow ? `<div class="trend-arrow">${arrow}</div>` : ''}
      `;
      card.addEventListener('click', () => {
        if (dates.length < 2) return;
        if (activeCard === card) {
          card.classList.remove('chart-active');
          activeCard = null;
          switchChartView(overviewDatasets(courses, dates, student, SHORT, COLORS),
            'Weighted overall % for all classes — click a class card to drill in', false, 50);
        } else {
          if (activeCard) activeCard.classList.remove('chart-active');
          activeCard = card;
          card.classList.add('chart-active');
          switchChartView(classDatasets(course.name, dates, student),
            (SHORT[course.name] || course.name) + ' — stacked category contributions · hover to see raw % · click again to return',
            true, 0);
        }
      });
      grid.appendChild(card);
    });
  }

  // ── Chart ───────────────────────────────────────────────────────────────────
  if (trendChart) { trendChart.destroy(); trendChart = null; }
  const cv  = document.getElementById('trend-chart');
  const ph  = document.getElementById('chart-ph');
  const sub = document.getElementById('chart-subtitle');
  if (dates.length < 2 || courses.length === 0) {
    cv.style.display = 'none';
    ph.style.display = '';
    sub.textContent  = '';
  } else {
    cv.style.display = '';
    ph.style.display = 'none';
    sub.textContent  = 'Weighted overall % for all classes — click a class card to drill in';
    const dateLabels = dates.map(d => {
      const dt = new Date(d + 'T12:00:00');
      return dt.toLocaleDateString('en-US', { month:'short', day:'numeric' });
    });
    trendChart = new Chart(cv.getContext('2d'), {
      type: 'line',
      data: { labels: dateLabels, datasets: overviewDatasets(courses, dates, student, SHORT, COLORS) },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode:'index', intersect:false },
        plugins: {
          legend: { position:'bottom', labels:{ boxWidth:10, padding:18, font:{ size:11 } } },
          tooltip: { callbacks: { label: ctx => { const p = ctx.parsed.y; const l = p>=90?'A':p>=80?'B':p>=70?'C':p>=60?'D':'F'; return ` ${ctx.dataset.label}: ${l} ${p?.toFixed(1)}%`; } } },
        },
        scales: {
          y: {
            min: 50, max: 105,
            ticks: { stepSize:10, callback: v => v <= 100 ? v + '%' : '', font:{ size:11 } },
            grid:  { color:'#f1f5f9' },
          },
          x: { ticks:{ font:{ size:11 } }, grid:{ display:false } },
        },
      },
    });
  }

  // ── Detail cards ─────────────────────────────────────────────────────────────
  const section = document.getElementById('detail-section');
  section.innerHTML = '';
  courses.forEach((course) => {
    const c = gradeColor(course.weightedPct);
    const card = document.createElement('div');
    card.className = 'detail-card';

    const hdr = document.createElement('div');
    hdr.className = 'detail-header';
    hdr.innerHTML = `
      <div>
        <div class="detail-title">${course.name}</div>
        <div class="detail-teacher">${course.teacher}</div>
      </div>
      <div class="detail-right">
        <div class="detail-pct"    style="color:${c.text}">${pctStr(course.weightedPct)}</div>
        <div class="detail-letter" style="color:${c.text}">${course.letterGrade}</div>
        <div class="chevron">▼</div>
      </div>
    `;

    const body = document.createElement('div');
    body.className = 'detail-body';
    body.style.display = 'none';

    course.categories.forEach(cat => {
      const hasPts = cat.possible > 0;
      const pct    = hasPts ? cat.earned / cat.possible : null;
      const bc     = gradeColor(pct);
      const barW   = hasPts ? Math.round(pct * 100) : 0;

      const row = document.createElement('div');
      row.className = 'cat-row';
      row.innerHTML = `
        <div class="cat-top">
          <div class="cat-left">
            <span class="cat-name">${cat.name}</span>
            <span class="cat-wt">${cat.weight}% weight</span>
          </div>
          <div class="cat-right">
            ${hasPts
              ? `<span class="cat-pts">${cat.earned}/${cat.possible}</span>
                 <span class="cat-pct" style="color:${bc.text}">${pctStr(pct)}</span>`
              : `<span class="not-yet">not yet assigned</span>`}
          </div>
        </div>
        ${hasPts ? `<div class="bar-bg"><div class="bar-fill" style="width:${barW}%;background:${bc.bar}"></div></div>` : ''}
      `;

      if (cat.assignments && cat.assignments.length > 0) {
        const list = document.createElement('div');
        list.className = 'asgn-list';
        cat.assignments.forEach(asgn => {
          const hasScore = asgn.earned != null && asgn.possible != null && asgn.possible > 0;
          const aPct     = hasScore ? asgn.earned / asgn.possible : null;
          const ac       = gradeColor(aPct);
          const aRow     = document.createElement('div');
          aRow.className = 'asgn-row';
          const noteAttr = asgn.note ? ` data-note="${asgn.note.replace(/"/g, '&quot;')}"` : '';
          const noteIcon = asgn.note
            ? `<svg viewBox="0 0 16 16" fill="currentColor"><path d="M14 1H2a1 1 0 0 0-1 1v9a1 1 0 0 0 1 1h2.5v3l3.5-3H14a1 1 0 0 0 1-1V2a1 1 0 0 0-1-1z"/></svg>`
            : '';
          aRow.innerHTML = `
            <div class="asgn-left">
              <span class="asgn-name">${asgn.name}</span>
            </div>
            <div class="asgn-right">
              <span class="asgn-note-icon"${noteAttr}>${noteIcon}</span>
              <span class="asgn-due">${asgn.due ? `Due ${asgn.due}` : ''}</span>
              ${hasScore
                ? `<span class="asgn-pts">${asgn.earned}/${asgn.possible}</span>
                   <span class="asgn-pct" style="color:${ac.text}">${pctStr(aPct)}</span>`
                : `<span class="asgn-pts"></span>
                   <span class="asgn-pct" style="color:#cbd5e1">—</span>`}
            </div>
          `;
          list.appendChild(aRow);
        });
        row.appendChild(list);
      }
      body.appendChild(row);
    });

    hdr.addEventListener('click', () => {
      const open = card.classList.toggle('open');
      body.style.display = open ? 'block' : 'none';
    });
    card.appendChild(hdr);
    card.appendChild(body);
    section.appendChild(card);
  });
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
renderDashboard();
</script>
</body>
